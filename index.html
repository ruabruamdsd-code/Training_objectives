<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เป้าหมายการฝึกอบรม</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" href="apple-touch-icon.png">
    <!-- Tailwind CSS สำหรับตกแต่ง -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome สำหรับไอคอน -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js สำหรับวาดกราฟ -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- SheetJS (xlsx-js-style) สำหรับ Import/Export Excel พร้อมรองรับการตกแต่งสไตล์ -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .hidden-safely { display: none !important; }

        /* การตั้งค่าสำหรับการพิมพ์ (Print Styles) */
        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; }
            
            /* บังคับให้แสดงสีพื้นหลังเมื่อพิมพ์ */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            /* ปรับ Layout ให้เหมาะกับกระดาษ A4 */
            .print-block { display: block !important; }
            .print-w-full { width: 100% !important; max-width: 100% !important; margin-bottom: 20px; }
            .print-grid-4 { 
                display: grid !important; 
                grid-template-columns: repeat(4, minmax(0, 1fr)) !important; 
                gap: 1rem !important; 
            }
            .print-avoid-break { page-break-inside: avoid; }
            
            /* ลดขนาดความสูงและช่องว่างเมื่อพิมพ์ */
            .min-h-screen { min-height: auto !important; padding: 0 !important; }
            .shadow-sm { box-shadow: none !important; border: 1px solid #e2e8f0 !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div class="min-h-screen p-4 md:p-6">
        <div class="max-w-[1400px] mx-auto space-y-6 print-w-full">
            
            <!-- Header Section -->
            <div class="flex flex-col xl:flex-row xl:items-center justify-between gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-slate-900 flex items-center gap-2">
                        <i class="fa-solid fa-chart-simple text-blue-600"></i>
                        เป้าหมายการฝึกอบรม
                    </h1>
                    <p class="text-slate-500 mt-1 text-sm">ฝ่ายพัฒนาฝีมือแรงงาน  สำนักงานพัฒนาฝีมือแรงงานลพบุรี</p>
                </div>
                
                <div class="flex flex-wrap gap-2 w-full xl:w-auto no-print justify-start xl:justify-end items-center">
                    <!-- Search Box -->
                    <div class="relative w-full sm:w-64">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-search text-slate-400"></i>
                        </div>
                        <input
                            type="text"
                            id="searchInput"
                            placeholder="ค้นหา โครงการ, กิจกรรม, รุ่น..."
                            class="block w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg text-sm leading-5 bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
                        />
                    </div>

                    <!-- Input ไฟล์ Excel ที่ซ่อนไว้ -->
                    <input type="file" id="excelFileInput" accept=".xlsx, .xls" class="hidden" onchange="handleExcelUpload(event)">
                    
                    <!-- ปุ่มนำเข้า Excel -->
                    <button 
                        onclick="document.getElementById('excelFileInput').click()"
                        class="flex items-center justify-center gap-1.5 bg-emerald-600 text-white px-3 py-2 rounded-lg hover:bg-emerald-700 transition-colors shadow-sm text-sm"
                    >
                        <i class="fa-solid fa-file-excel"></i> นำเข้า
                    </button>

                    <!-- ปุ่มส่งออก Excel -->
                    <button 
                        onclick="exportToExcel()"
                        class="flex items-center justify-center gap-1.5 bg-slate-600 text-white px-3 py-2 rounded-lg hover:bg-slate-700 transition-colors shadow-sm text-sm"
                    >
                        <i class="fa-solid fa-file-export"></i> ส่งออก
                    </button>

                    <!-- Print Button -->
                    <button 
                        onclick="window.print()"
                        class="flex items-center justify-center gap-1.5 bg-white border border-slate-300 text-slate-700 px-3 py-2 rounded-lg hover:bg-slate-50 transition-colors shadow-sm text-sm"
                    >
                        <i class="fa-solid fa-print"></i> พิมพ์
                    </button>
                    <!-- Add Project Button -->
                    <button 
                        onclick="openModal('addProject')"
                        class="flex items-center justify-center gap-1.5 bg-blue-600 text-white px-3 py-2 rounded-lg hover:bg-blue-700 transition-colors shadow-sm text-sm"
                    >
                        <i class="fa-solid fa-plus"></i> เพิ่มโครงการ
                    </button>
                </div>
            </div>

            <!-- แบ่งเลย์เอาต์หน้าจอเป็น 2 คอลัมน์ -->
            <div class="print-block grid grid-cols-1 xl:grid-cols-12 gap-6 items-start">
                
                <!-- ฝั่งซ้าย: เนื้อหาหลัก -->
                <div class="xl:col-span-8 space-y-6 print-w-full">
                    <!-- KPI Summary Cards -->
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 print-grid-4" id="kpiContainer">
                        <!-- KPI cards will be rendered here -->
                    </div>

                    <!-- เพิ่มส่วนจัดอันดับหลักสูตร -->
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden no-print">
                        <div class="p-4 bg-slate-100 border-b border-slate-200 font-semibold text-slate-700 flex justify-between items-center">
                            <span><i class="fa-solid fa-trophy text-amber-500 mr-2"></i> อันดับหลักสูตรที่เปิดอบรมมากที่สุด</span>
                        </div>
                        <div class="p-4 bg-slate-50/50">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3" id="courseRankingContainer">
                                <div class="text-center text-slate-500 col-span-full">กำลังโหลดข้อมูล...</div>
                            </div>
                        </div>
                    </div>

                    <!-- Main Content: Hierarchical List -->
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="p-4 bg-slate-100 border-b border-slate-200 font-semibold text-slate-700 flex justify-between items-center">
                            <span>รายการโครงการ (Projects)</span>
                            <span id="projectCountBadge" class="text-sm font-normal bg-blue-100 text-blue-700 px-3 py-1 rounded-full">
                                กำลังโหลดข้อมูล...
                            </span>
                        </div>

                        <div class="divide-y divide-slate-100" id="projectListContainer">
                            <div class="p-12 text-center text-slate-500">
                                <i class="fa-solid fa-spinner fa-spin text-3xl text-blue-500 mb-4"></i>
                                <p>กำลังเชื่อมต่อฐานข้อมูล...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ฝั่งขวา: Sidebar สรุปกราฟ -->
                <div class="xl:col-span-4 space-y-6 sticky top-6 print-w-full print-avoid-break">
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                        <h3 class="font-bold text-slate-800 text-lg mb-5 text-center border-b border-slate-100 pb-4">สถานะแยกรายไตรมาส</h3>
                        
                        <!-- แถบสถานะความคืบหน้ารวม -->
                        <div id="globalProgressContainer"></div>

                        <!-- 3 Charts Grid -->
                        <div class="grid grid-cols-2 gap-6 mt-6 print-grid-4">
                            <!-- Q1-Q2 (รวมกันเต็มความกว้าง) -->
                            <div class="col-span-2 text-center flex flex-col items-center print-avoid-break">
                                <span class="bg-indigo-50 text-indigo-700 text-xs font-bold px-3 py-1 rounded-full mb-3">ไตรมาส 1-2</span>
                                <div class="relative w-32 h-32"><canvas id="chartQ1_2"></canvas></div>
                                <div class="text-xs text-slate-600 font-medium mt-3 leading-relaxed" id="textQ1_2"></div>
                            </div>
                            <!-- Q3 -->
                            <div class="text-center flex flex-col items-center print-avoid-break">
                                <span class="bg-indigo-50 text-indigo-700 text-xs font-bold px-3 py-1 rounded-full mb-3">ไตรมาส 3</span>
                                <div class="relative w-28 h-28"><canvas id="chartQ3"></canvas></div>
                                <div class="text-xs text-slate-600 font-medium mt-3 leading-relaxed" id="textQ3"></div>
                            </div>
                            <!-- Q4 -->
                            <div class="text-center flex flex-col items-center print-avoid-break">
                                <span class="bg-indigo-50 text-indigo-700 text-xs font-bold px-3 py-1 rounded-full mb-3">ไตรมาส 4</span>
                                <div class="relative w-28 h-28"><canvas id="chartQ4"></canvas></div>
                                <div class="text-xs text-slate-600 font-medium mt-3 leading-relaxed" id="textQ4"></div>
                            </div>
                        </div>

                        <!-- คำอธิบายกราฟ (Legend & Details) -->
                        <div class="flex justify-center gap-4 mt-6 border-t border-slate-100 pt-4 text-xs">
                            <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-emerald-500"></span><span class="text-slate-600">เสร็จสิ้น</span></div>
                            <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-blue-500"></span><span class="text-slate-600">กำลังดำเนินการ</span></div>
                            <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-slate-200"></span><span class="text-slate-600">รอเปิดอบรม</span></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Modal Form (Hidden by default) -->
    <div id="formModal" class="hidden-safely no-print fixed inset-0 bg-slate-900/40 z-50 flex items-center justify-center p-4 backdrop-blur-sm overflow-y-auto">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden transform transition-all my-8">
            <div class="flex justify-between items-center p-4 border-b border-slate-100 bg-slate-50">
                <h3 id="modalTitle" class="text-lg font-bold text-slate-800">หัวข้อ</h3>
                <button onclick="closeModal()" class="p-1 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-md transition-colors">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            
            <form id="dataForm" class="p-5 space-y-4">
                <input type="hidden" id="formType">
                <input type="hidden" id="targetProjectId">
                <input type="hidden" id="targetMainActivityId">
                <input type="hidden" id="targetSubActivityId">
                <input type="hidden" id="targetCourseId">

                <!-- Dynamic inputs will be inserted here by JS -->
                <div id="modalBody" class="space-y-4"></div>

                <div class="pt-4 flex justify-end gap-2 border-t border-slate-100 mt-6">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">
                        ยกเลิก
                    </button>
                    <button type="submit" id="saveBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-2">
                        บันทึกข้อมูล
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDK & Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { 
            getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, deleteDoc
        } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWXcS3UGqNLzFsNk0PgCTIveeLIkSOYTs",
            authDomain: "edoblock-51e6c.firebaseapp.com",
            projectId: "edoblock-51e6c",
            storageBucket: "edoblock-51e6c.firebasestorage.app",
            messagingSenderId: "426632152384",
            appId: "1:426632152384:web:73d4c59491c289f206a6a5",
            measurementId: "G-60F8TZ1NHM"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const getProjectsCol = () => collection(db, 'artifacts', appId, 'public', 'data', 'projects_v2'); 
        const getProjectDoc = (pId) => doc(db, 'artifacts', appId, 'public', 'data', 'projects_v2', pId);

        let appData = [];
        let searchTerm = '';
        let expandedProjects = new Set();
        let expandedMainActivities = new Set();
        let expandedSubActivities = new Set();
        let currentUser = null;
        let isListenerInit = false;
        
        let chartInstances = { '1-2': null, '3': null, '4': null };

        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } catch (e) {
                        await signInAnonymously(auth);
                    }
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth init error:", error);
            }
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) initDBListener();
        });

        initAuth();

        function initDBListener() {
            if (isListenerInit || !currentUser) return;
            isListenerInit = true;
            
            onSnapshot(getProjectsCol(), (snapshot) => {
                appData = snapshot.docs.map(doc => ({
                    id: doc.id,
                    projectName: doc.data().projectName || 'ไม่มีชื่อโครงการ',
                    mainActivities: doc.data().mainActivities || []
                }));
                
                if (expandedProjects.size === 0 && appData.length > 0) {
                    appData.forEach(p => {
                        expandedProjects.add(p.id);
                        p.mainActivities.forEach(ma => {
                            expandedMainActivities.add(ma.id);
                            (ma.subActivities || []).forEach(sa => expandedSubActivities.add(sa.id));
                        });
                    });
                }
                renderUI();
            }, (error) => {
                document.getElementById('projectListContainer').innerHTML = `<div class="p-8 text-center text-red-500">ไม่สามารถเชื่อมต่อฐานข้อมูลได้: ${error.message}</div>`;
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value.toLowerCase();
            renderUI();
        });

        function getFilteredData() {
            if (!searchTerm.trim()) return appData;
            
            return appData.map(project => {
                const projectMatch = project.projectName.toLowerCase().includes(searchTerm);
                
                const filteredMainActivities = project.mainActivities.map(mainAct => {
                    const mainMatch = mainAct.mainActivityName.toLowerCase().includes(searchTerm);
                    
                    const filteredSubActivities = (mainAct.subActivities || []).map(subAct => {
                        const subMatch = subAct.subActivityName.toLowerCase().includes(searchTerm);
                        const filteredCourses = (subAct.courses || []).filter(c => 
                            c.courseName.toLowerCase().includes(searchTerm) ||
                            c.courseCode.toLowerCase().includes(searchTerm) ||
                            c.responsiblePerson.toLowerCase().includes(searchTerm)
                        );

                        if (subMatch || filteredCourses.length > 0 || mainMatch || projectMatch) {
                            return { ...subAct, courses: filteredCourses.length > 0 ? filteredCourses : (subAct.courses || []) };
                        }
                        return null;
                    }).filter(Boolean);

                    if (mainMatch || filteredSubActivities.length > 0 || projectMatch) {
                        return { ...mainAct, subActivities: filteredSubActivities };
                    }
                    return null;
                }).filter(Boolean);

                if (projectMatch || filteredMainActivities.length > 0) {
                    return { ...project, mainActivities: filteredMainActivities };
                }
                return null;
            }).filter(Boolean);
        }

        function renderUI() {
            const filteredData = getFilteredData();
            
            let tMainAct = 0, tSubAct = 0, tCour = 0;
            let totalTrainees = 0;
            let statusCounts = { done: 0, active: 0, pending: 0 };
            let quarterCounts = {
                '1-2': { courses: 0, trainees: 0, done: 0, active: 0, pending: 0 },
                '3': { courses: 0, trainees: 0, done: 0, active: 0, pending: 0 },
                '4': { courses: 0, trainees: 0, done: 0, active: 0, pending: 0 }
            };
            let courseRanking = {};

            appData.forEach(p => {
                tMainAct += p.mainActivities.length;
                p.mainActivities.forEach(ma => {
                    tSubAct += (ma.subActivities || []).length;
                    (ma.subActivities || []).forEach(sa => {
                        tCour += (sa.courses || []).length;
                        (sa.courses || []).forEach(c => {
                            let traineesCount = c.hasOwnProperty('trainees') ? parseInt(c.trainees) || 0 : 20;
                            totalTrainees += traineesCount;
                            
                            let q = c.quarter || '1-2';
                            if (q === '1' || q === '2') q = '1-2';
                            
                            quarterCounts[q].courses++;
                            quarterCounts[q].trainees += traineesCount;
                            
                            if(c.status === 'เสร็จสิ้น') {
                                statusCounts.done++;
                                quarterCounts[q].done++;
                            } else if(c.status === 'กำลังดำเนินการ') {
                                statusCounts.active++;
                                quarterCounts[q].active++;
                            } else {
                                statusCounts.pending++;
                                quarterCounts[q].pending++;
                            }

                            let baseName = c.courseName.replace(/\s*\(รุ่นที่.*?\)/g, '').trim();
                            if (!courseRanking[baseName]) courseRanking[baseName] = 0;
                            courseRanking[baseName]++;
                        });
                    });
                });
            });

            let openedCourses = statusCounts.done + statusCounts.active;

            document.getElementById('kpiContainer').innerHTML = `
                ${createKpiCard('โครงการทั้งหมด', appData.length, 'fa-folder-open text-blue-500')}
                ${createKpiCard('กิจกรรมหลัก', tMainAct, 'fa-briefcase text-emerald-500')}
                ${createKpiCard('เปิดแล้ว / ทั้งหมด (รุ่น)', '<span class="text-blue-600">' + openedCourses + '</span><span class="text-slate-400 text-sm font-normal"> / ' + tCour + '</span>', 'fa-layer-group text-amber-500')}
                ${createKpiCard('จำนวนผู้เข้ารับการฝึกทั้งหมด (คน)', totalTrainees, 'fa-users text-purple-500')}
            `;

            updateDashboardCharts(openedCourses, tCour, quarterCounts);

            let sortedCourses = Object.keys(courseRanking).map(name => ({name, count: courseRanking[name]})).sort((a,b) => b.count - a.count);
            let rankingHtml = '';
            sortedCourses.slice(0, 6).forEach((item, index) => {
                let rankColor = index === 0 ? 'bg-amber-100 text-amber-600' : index === 1 ? 'bg-slate-200 text-slate-600' : index === 2 ? 'bg-orange-100 text-orange-700' : 'bg-blue-50 text-blue-600';
                rankingHtml += `
                    <div class="flex items-center justify-between p-3 border border-slate-200 rounded-lg shadow-sm bg-white">
                        <div class="flex items-center gap-3 overflow-hidden">
                            <span class="w-6 h-6 flex-shrink-0 flex items-center justify-center rounded-full ${rankColor} font-bold text-xs">${index + 1}</span>
                            <span class="text-sm font-medium text-slate-700 truncate" title="${item.name}">${item.name}</span>
                        </div>
                        <span class="text-sm font-bold text-blue-700 flex-shrink-0 ml-2">${item.count} <span class="text-[10px] text-slate-400 font-normal">รุ่น</span></span>
                    </div>
                `;
            });
            if(sortedCourses.length === 0) rankingHtml = '<div class="col-span-full text-center text-sm text-slate-400 py-4">ยังไม่มีข้อมูลหลักสูตร</div>';
            document.getElementById('courseRankingContainer').innerHTML = rankingHtml;

            document.getElementById('projectCountBadge').innerText = `พบ ${filteredData.length} โครงการ`;
            const listContainer = document.getElementById('projectListContainer');

            if (filteredData.length === 0) {
                listContainer.innerHTML = `<div class="p-12 text-center text-slate-500">ไม่พบข้อมูล</div>`;
                return;
            }

            let htmlStr = '';
            filteredData.forEach(project => {
                const isPExp = expandedProjects.has(project.id);
                htmlStr += `
                    <div class="p-2 border-b border-slate-100 last:border-0 print-avoid-break">
                        <!-- โครงการ -->
                        <div class="flex items-center gap-2 p-3 bg-blue-50 hover:bg-blue-100 rounded-lg cursor-pointer transition-colors group" onclick="toggleProject('${project.id}')">
                            <i class="fa-solid ${isPExp ? 'fa-chevron-down' : 'fa-chevron-right'} text-blue-400 w-4 no-print"></i>
                            <i class="fa-solid fa-folder-open text-xl text-blue-700 flex-shrink-0"></i>
                            <h2 class="text-lg font-bold text-slate-800 leading-tight">${project.projectName}</h2>
                            
                            <div class="ml-auto flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity no-print">
                                <button onclick="event.stopPropagation(); openModal('editProject', '${project.id}')" class="text-blue-500 hover:text-blue-700 p-1.5 rounded hover:bg-blue-200 transition-colors" title="แก้ไขโครงการ"><i class="fa-solid fa-pen"></i></button>
                                <button onclick="event.stopPropagation(); deleteItem('project', '${project.id}')" class="text-red-400 hover:text-red-600 p-1.5 rounded hover:bg-red-100 transition-colors mr-1" title="ลบโครงการ"><i class="fa-solid fa-trash"></i></button>
                                <button onclick="event.stopPropagation(); openModal('addMainActivity', '${project.id}')" class="flex items-center gap-1 text-xs bg-emerald-50 text-emerald-700 hover:bg-emerald-200 px-2.5 py-1.5 rounded-md border border-emerald-200 shadow-sm transition-colors">
                                    <i class="fa-solid fa-plus"></i> เพิ่มกิจกรรมหลัก
                                </button>
                            </div>
                        </div>

                        ${isPExp ? `

        function updateDashboardCharts(openedCourses, total, quarterCounts) {
            const getPct = (val, tot = total) => tot > 0 ? Math.round((val / tot) * 100) : 0;
            const openedPct = getPct(openedCourses);

            document.getElementById('globalProgressContainer').innerHTML = `
                <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 text-left shadow-inner">
                    <div class="flex justify-between text-sm mb-2 items-end">
                        <span class="font-bold text-slate-700">รุ่นที่เปิดไปแล้วทั้งหมด</span>
                        <span class="font-bold text-blue-700 text-base">${openedCourses} <span class="text-slate-500 text-sm font-normal">/ ${total}</span></span>
                    </div>
                    <div class="w-full bg-blue-200/50 rounded-full h-2.5 mb-1.5 overflow-hidden">
                        <div class="bg-blue-600 h-2.5 rounded-full transition-all duration-500" style="width: ${openedPct}%"></div>
                    </div>
                    <div class="text-right text-xs text-blue-600/80 font-medium">ความคืบหน้า ${openedPct}%</div>
                </div>
            `;

            ['1-2', '3', '4'].forEach(q => {
                const canvasId = `chartQ${q.replace('-', '_')}`;
                const textId = `textQ${q.replace('-', '_')}`;
                
                const ctx = document.getElementById(canvasId);
                if (!ctx) return;
                
                const qData = quarterCounts[q];
                const chartData = [qData.done, qData.active, qData.pending];
                const hasData = qData.courses > 0;

                document.getElementById(textId).innerHTML = `
                    <span class="font-bold text-slate-800 text-sm">${qData.courses} รุ่น</span> <br>
                    <span class="text-slate-500">จำนวนผู้เข้ารับการฝึกอบรม ${qData.trainees} คน</span>
                `;

                if (chartInstances[q]) {
                    chartInstances[q].data.datasets[0].data = hasData ? chartData : [1];
                    chartInstances[q].data.datasets[0].backgroundColor = hasData ? ['#10b981', '#3b82f6', '#e2e8f0'] : ['#f1f5f9'];
                    chartInstances[q].update();
                } else {
                    chartInstances[q] = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: ['เสร็จสิ้น', 'กำลังดำเนินการ', 'รอเปิดอบรม'],
                            datasets: [{
                                data: hasData ? chartData : [1],
                                backgroundColor: hasData ? ['#10b981', '#3b82f6', '#e2e8f0'] : ['#f1f5f9'],
                                borderWidth: 0,
                                hoverOffset: 2
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            cutout: '65%',
                            plugins: {
                                legend: { display: false },
                                tooltip: {
                                    enabled: hasData,
                                    callbacks: {
                                        label: function(context) {
                                            return ' ' + context.label + ': ' + context.raw + ' รุ่น';
                                        }
                                    }
                                }
                            }
                        }
                    });
                }
            });
        }

        function renderStatusBadge(status) {

            else if (status === 'เสร็จสิ้น') colors = 'bg-emerald-50 text-emerald-700 border-emerald-200';
            return `<span class="px-2 py-0.5 text-[10px] rounded-full border font-medium whitespace-nowrap ${colors}">${status}</span>`;
        }

        document.getElementById('dataForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return alert("กรุณารอระบบยืนยันตัวตนสักครู่...");

            const type = document.getElementById('formType').value;
            const pId = document.getElementById('targetProjectId').value;
            const mId = document.getElementById('targetMainActivityId').value;
            const sId = document.getElementById('targetSubActivityId').value;
            const cId = document.getElementById('targetCourseId').value;
            
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> กำลังบันทึก...';
            saveBtn.disabled = true;

            try {
                if (type === 'addProject') {
                    await addDoc(getProjectsCol(), {
                        projectName: document.getElementById('inp_pName').value,
                        mainActivities: []
                    });
                } 
                else if (type === 'editProject') {
                    await updateDoc(getProjectDoc(pId), {
                        projectName: document.getElementById('inp_pName').value
                    });
                }
                else if (type === 'addMainActivity') {
                    const proj = appData.find(x => x.id === pId);
                    const newMAct = { id: 'M-' + Date.now(), mainActivityName: document.getElementById('inp_mName').value, subActivities: [] };
                    await updateDoc(getProjectDoc(pId), { mainActivities: [...proj.mainActivities, newMAct] });
                    expandedMainActivities.add(newMAct.id);
                } 
                else if (type === 'editMainActivity') {
                    const proj = appData.find(x => x.id === pId);
                    const mainActs = [...proj.mainActivities];
                    const mIndex = mainActs.findIndex(x => x.id === mId);
                    mainActs[mIndex].mainActivityName = document.getElementById('inp_mName').value;
                    await updateDoc(getProjectDoc(pId), { mainActivities: mainActs });
                }
                else if (type === 'addSubActivity') {
                    const proj = appData.find(x => x.id === pId);
                    const mainActs = [...proj.mainActivities];
                    const mIndex = mainActs.findIndex(x => x.id === mId);
                    
                    if (!mainActs[mIndex].subActivities) mainActs[mIndex].subActivities = [];
                    const newSAct = { id: 'S-' + Date.now(), subActivityName: document.getElementById('inp_sName').value, courses: [] };
                    mainActs[mIndex].subActivities.push(newSAct);
                    
                    await updateDoc(getProjectDoc(pId), { mainActivities: mainActs });
                    expandedSubActivities.add(newSAct.id);
                }
                else if (type === 'editSubActivity') {
                    const proj = appData.find(x => x.id === pId);
                    const mainActs = [...proj.mainActivities];
                    const mIndex = mainActs.findIndex(x => x.id === mId);
                    const sIndex = mainActs[mIndex].subActivities.findIndex(x => x.id === sId);
                    mainActs[mIndex].subActivities[sIndex].subActivityName = document.getElementById('inp_sName').value;
                    await updateDoc(getProjectDoc(pId), { mainActivities: mainActs });
                }
                else if (type === 'addCourse') {
                    const proj = appData.find(x => x.id === pId);
                    const mainActs = [...proj.mainActivities];
                    const mIndex = mainActs.findIndex(x => x.id === mId);
                    const sIndex = mainActs[mIndex].subActivities.findIndex(x => x.id === sId);
                    
                    if (!mainActs[mIndex].subActivities[sIndex].courses) mainActs[mIndex].subActivities[sIndex].courses = [];
                    mainActs[mIndex].subActivities[sIndex].courses.push({
                        id: 'C-' + Date.now(),
                        courseCode: document.getElementById('inp_cCode').value,
                        courseName: document.getElementById('inp_cName').value,
                        quarter: document.getElementById('inp_cQuarter').value,
                        hours: document.getElementById('inp_cHours').value,
                        trainees: parseInt(document.getElementById('inp_cTrainees').value) || 20,
                        responsiblePerson: document.getElementById('inp_cPerson').value,
                        trainingDate: document.getElementById('inp_cDate').value,
                        status: document.getElementById('inp_cStatus').value
                    });

                    await updateDoc(getProjectDoc(pId), { mainActivities: mainActs });
                } 
                else if (type === 'editCourse') {
                    const proj = appData.find(x => x.id === pId);
                    const mainActs = [...proj.mainActivities];
                    const mIndex = mainActs.findIndex(x => x.id === mId);
                    const sIndex = mainActs[mIndex].subActivities.findIndex(x => x.id === sId);
                    const cIndex = mainActs[mIndex].subActivities[sIndex].courses.findIndex(x => x.id === cId);
                    
                    mainActs[mIndex].subActivities[sIndex].courses[cIndex] = {
                        ...mainActs[mIndex].subActivities[sIndex].courses[cIndex],
                        courseCode: document.getElementById('inp_cCode').value,
                        courseName: document.getElementById('inp_cName').value,
                        quarter: document.getElementById('inp_cQuarter').value,
                        hours: document.getElementById('inp_cHours').value,
                        trainees: parseInt(document.getElementById('inp_cTrainees').value) || 20,
                        responsiblePerson: document.getElementById('inp_cPerson').value,
                        trainingDate: document.getElementById('inp_cDate').value,
                        status: document.getElementById('inp_cStatus').value
                    };

                    await updateDoc(getProjectDoc(pId), { mainActivities: mainActs });
                }
                closeModal();
            } catch (error) {
                console.error("Error saving doc:", error);
                alert("เกิดข้อผิดพลาดในการบันทึกข้อมูล: " + error.message);
            } finally {
                saveBtn.innerHTML = 'บันทึกข้อมูล';
                saveBtn.disabled = false;
            }
        });

        // ฟังก์ชันสำหรับการลบข้อมูล (Delete Function)
        window.deleteItem = async (type, pId, mId = '', sId = '', cId = '') => {
            if (!confirm('คุณยืนยันที่จะลบข้อมูลนี้ใช่หรือไม่?\n(คำเตือน: การลบจะไม่สามารถกู้คืนได้ และข้อมูลย่อยด้านในจะถูกลบไปด้วยทั้งหมด)')) return;
            
            if (!currentUser) return alert("กรุณารอระบบยืนยันตัวตนสักครู่...");
            
            try {
                if (type === 'project') {
                    await deleteDoc(getProjectDoc(pId));
                } else if (type === 'mainActivity') {
                    const proj = appData.find(x => x.id === pId);
                    const updatedActs = proj.mainActivities.filter(x => x.id !== mId);
                    await updateDoc(getProjectDoc(pId), { mainActivities: updatedActs });
                } else if (type === 'subActivity') {
                    const proj = appData.find(x => x.id === pId);
                    const mainActs = [...proj.mainActivities];
                    const mIndex = mainActs.findIndex(x => x.id === mId);
                    mainActs[mIndex].subActivities = mainActs[mIndex].subActivities.filter(x => x.id !== sId);
                    await updateDoc(getProjectDoc(pId), { mainActivities: mainActs });
                } else if (type === 'course') {
                    const proj = appData.find(x => x.id === pId);
                    const mainActs = [...proj.mainActivities];
                    const mIndex = mainActs.findIndex(x => x.id === mId);
                    const sIndex = mainActs[mIndex].subActivities.findIndex(x => x.id === sId);
                    mainActs[mIndex].subActivities[sIndex].courses = mainActs[mIndex].subActivities[sIndex].courses.filter(x => x.id !== cId);
                    await updateDoc(getProjectDoc(pId), { mainActivities: mainActs });
                }
            } catch (error) {
                console.error("Delete Error:", error);
                alert("เกิดข้อผิดพลาดในการลบ: " + error.message);
            }
        };

        // ==========================================
        // ฟังก์ชันสำหรับ นำเข้า/ส่งออก EXCEL
        // ==========================================

        // ฟังก์ชันอ่านไฟล์ Excel นำเข้าฐานข้อมูล
        window.handleExcelUpload = async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            alert("กำลังอ่านไฟล์ Excel และบันทึกเข้าฐานข้อมูล กรุณารอสักครู่ (อาจใช้เวลาสักครู่หากข้อมูลมีจำนวนมาก)...");

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet);
                    
                    if(jsonData.length === 0) {
                        return alert("ไม่พบข้อมูลในไฟล์ Excel");
                    }
                    
                    const projectsMap = {};

                    jsonData.forEach(row => {
                        const pName = row['ชื่อโครงการ'];
                        const mName = row['กิจกรรมหลัก'];
                        const sName = row['กิจกรรมย่อย'];
                        
                        if (!pName) return; // ข้ามบรรทัดที่ไม่มีชื่อโครงการ

                        if (!projectsMap[pName]) {
                            projectsMap[pName] = { projectName: pName, mainActivities: [] };
                        }
                        
                        if (mName) {
                            let mainAct = projectsMap[pName].mainActivities.find(m => m.mainActivityName === mName);
                            if (!mainAct) {
                                mainAct = { id: 'M-' + Date.now() + Math.random(), mainActivityName: mName, subActivities: [] };
                                projectsMap[pName].mainActivities.push(mainAct);
                            }

                            if (sName) {
                                let subAct = mainAct.subActivities.find(s => s.subActivityName === sName);
                                if (!subAct) {
                                    subAct = { id: 'S-' + Date.now() + Math.random(), subActivityName: sName, courses: [] };
                                    mainAct.subActivities.push(subAct);
                                }

                                if (row['ชื่อหลักสูตร'] || row['รหัสหลักสูตร']) {
                                    subAct.courses.push({
                                        id: 'C-' + Date.now() + Math.random(),
                                        courseCode: row['รหัสหลักสูตร'] || '',
                                        courseName: row['ชื่อหลักสูตร'] || '',
                                        quarter: row['ไตรมาส']?.toString() || '1-2',
                                        hours: row['ชั่วโมง'] || '',
                                        trainees: parseInt(row['จำนวนคน']) || 20,
                                        responsiblePerson: row['ผู้รับผิดชอบ'] || '',
                                        trainingDate: row['วันที่อบรม'] || '',
                                        status: row['สถานะ'] || 'รอเปิดอบรม'
                                    });
                                }
                            }
                        }
                    });

                    const projectsArray = Object.values(projectsMap);
                    let importedCount = 0;
                    
                    for (const project of projectsArray) {
                         await addDoc(getProjectsCol(), project);
                         importedCount++;
                    }

                    alert(`นำเข้าข้อมูลสำเร็จแล้วจำนวน ${importedCount} โครงการ!`);
                    document.getElementById('excelFileInput').value = ''; 
                    
                } catch (error) {
                    console.error("Excel Import Error:", error);
                    alert("เกิดข้อผิดพลาดในการนำเข้าข้อมูล: " + error.message);
                }
            };
            
            reader.readAsArrayBuffer(file);
        };

        // ฟังก์ชันดึงข้อมูลจากระบบออกเป็นไฟล์ Excel แบบมีการตกแต่ง (Styling)
        window.exportToExcel = () => {
            if (!appData || appData.length === 0) {
                return alert("ไม่มีข้อมูลสำหรับส่งออก");
            }

            const aoaData = []; 
            const rowsConfig = []; // เก็บความสูงของบรรทัด (Row heights)

            // ----------------------------------------------------
            // 🎨 การกำหนด Styles ต่างๆ ของเซลล์ใน Excel
            // ----------------------------------------------------
            const borderAll = {
                top: { style: "thin", color: { auto: 1 } },
                bottom: { style: "thin", color: { auto: 1 } },
                left: { style: "thin", color: { auto: 1 } },
                right: { style: "thin", color: { auto: 1 } }
            };

            const styleProject = { font: { name: 'Sarabun', sz: 14, bold: true, color: { rgb: "1E3A8A" } } };
            const styleMain = { font: { name: 'Sarabun', sz: 12, bold: true, color: { rgb: "047857" } } };
            const styleSub = { font: { name: 'Sarabun', sz: 12, bold: true, color: { rgb: "B45309" } } };
            
            const styleHeader = {
                font: { name: 'Sarabun', sz: 11, bold: true, color: { rgb: "FFFFFF" } },
                fill: { fgColor: { rgb: "2563EB" } }, // สีพื้นหลังสีน้ำเงิน
                alignment: { horizontal: "center", vertical: "center", wrapText: true },
                border: borderAll
            };

            const styleDataCenter = {
                font: { name: 'Sarabun', sz: 11 },
                alignment: { horizontal: "center", vertical: "center" },
                border: borderAll
            };

            const styleDataLeft = {
                font: { name: 'Sarabun', sz: 11 },
                alignment: { horizontal: "left", vertical: "center" },
                border: borderAll
            };

            // ----------------------------------------------------
            // 🔄 ดึงข้อมูลและกำหนดสไตล์ทีละบรรทัด
            // ----------------------------------------------------
            appData.forEach((project, pIndex) => {
                
                // แถวที่ 1: ชื่อโครงการ
                aoaData.push([{ v: `${pIndex + 1}. ${project.projectName || 'ไม่มีชื่อโครงการ'}`, t: 's', s: styleProject }]);
                rowsConfig.push({ hpt: 30 }); // ความสูงบรรทัด 30
                
                if (!project.mainActivities || project.mainActivities.length === 0) {
                    aoaData.push([]); rowsConfig.push({ hpt: 15 });
                    return;
                }

                project.mainActivities.forEach(mainAct => {
                    // แถวที่ 2: กิจกรรมหลัก
                    aoaData.push(["", { v: `กิจกรรมหลัก: ${mainAct.mainActivityName || ''}`, t: 's', s: styleMain }]);
                    rowsConfig.push({ hpt: 25 });

                    if (!mainAct.subActivities || mainAct.subActivities.length === 0) return;

                    mainAct.subActivities.forEach(subAct => {
                        // แถวที่ 3: กิจกรรมย่อย
                        aoaData.push(["", "", { v: `กิจกรรมย่อย: ${subAct.subActivityName || ''}`, t: 's', s: styleSub }]);
                        rowsConfig.push({ hpt: 22 });

                        if (!subAct.courses || subAct.courses.length === 0) return;

                        // แถวที่ 4: หัวตารางของหลักสูตร (มีพื้นหลังและเส้นขอบ)
                        aoaData.push([
                            "", "", "", 
                            { v: "ไตรมาส", t: 's', s: styleHeader }, 
                            { v: "รหัสหลักสูตร", t: 's', s: styleHeader }, 
                            { v: "ชื่อหลักสูตร (รุ่น)", t: 's', s: styleHeader }, 
                            { v: "ชั่วโมง", t: 's', s: styleHeader }, 
                            { v: "จำนวนคน", t: 's', s: styleHeader }, 
                            { v: "ผู้รับผิดชอบ", t: 's', s: styleHeader }, 
                            { v: "วันเวลาที่เปิดฝึก", t: 's', s: styleHeader }, 
                            { v: "สถานะ", t: 's', s: styleHeader }
                        ]);
                        rowsConfig.push({ hpt: 25 });

                        // แถวที่ 5 เป็นต้นไป: ข้อมูลหลักสูตร (มีเส้นตีกรอบ)
                        subAct.courses.forEach(course => {
                            let qLabel = course.quarter || '1-2';
                            if (qLabel === '1' || qLabel === '2') qLabel = '1-2';

                            aoaData.push([
                                "", "", "", // เว้นว่าง 3 คอลัมน์แรกเพื่อให้เยื้อง
                                { v: `Q${qLabel}`, t: 's', s: styleDataCenter },
                                { v: course.courseCode || '-', t: 's', s: styleDataCenter },
                                { v: course.courseName || '-', t: 's', s: styleDataLeft },
                                { v: course.hours || '-', t: 's', s: styleDataCenter },
                                { v: course.hasOwnProperty('trainees') ? course.trainees : 20, t: 'n', s: styleDataCenter },
                                { v: course.responsiblePerson || '-', t: 's', s: styleDataLeft },
                                { v: course.trainingDate || '-', t: 's', s: styleDataCenter },
                                { v: course.status || 'รอเปิดอบรม', t: 's', s: styleDataCenter }
                            ]);
                            rowsConfig.push({ hpt: 20 });
                        });
                    });
                });
                
                // เพิ่มบรรทัดว่างคั่นระหว่างจบแต่ละโครงการ
                aoaData.push([]);
                rowsConfig.push({ hpt: 15 });
            });

            // สร้าง Worksheet
            const worksheet = XLSX.utils.aoa_to_sheet(aoaData);
            
            // 📏 ปรับความกว้างของคอลัมน์ (Column Widths)
            worksheet['!cols'] = [
                { wch: 45 }, // A: โครงการ
                { wch: 45 }, // B: กิจกรรมหลัก
                { wch: 40 }, // C: กิจกรรมย่อย
                { wch: 12 }, // D: ไตรมาส
                { wch: 15 }, // E: รหัสหลักสูตร
                { wch: 55 }, // F: ชื่อหลักสูตร
                { wch: 12 }, // G: ชั่วโมง
                { wch: 12 }, // H: จำนวนคน
                { wch: 25 }, // I: ผู้รับผิดชอบ
                { wch: 20 }, // J: วันเวลา
                { wch: 15 }  // K: สถานะ
            ];

            // 📏 ปรับความสูงของแถว (Row Heights)
            worksheet['!rows'] = rowsConfig;

            // ผูกลง Workbook และส่งออก
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Training Data");

            const date = new Date();
            const fileName = `ข้อมูลการฝึกอบรม_${date.getFullYear()}${String(date.getMonth() + 1).padStart(2, '0')}${String(date.getDate()).padStart(2, '0')}.xlsx`;

            XLSX.writeFile(workbook, fileName);
        };

    </script>
</body>
