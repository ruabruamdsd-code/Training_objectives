<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เป้าหมายการฝึกอบรม</title>
    <!-- Tailwind CSS สำหรับตกแต่ง -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome สำหรับไอคอน -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js สำหรับวาดกราฟ -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .hidden-safely { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div class="min-h-screen p-4 md:p-6">
        <!-- ขยายความกว้างเป็น max-w-[1400px] หรือ 95% เพื่อลดพื้นที่ว่างด้านข้าง -->
        <div class="max-w-[1400px] mx-auto space-y-6">
            
            <!-- Header Section -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-slate-900 flex items-center gap-2">
                        <i class="fa-solid fa-chart-simple text-blue-600"></i>
                        เป้าหมายการฝึกอบรม
                    </h1>
                    <p class="text-slate-500 mt-1 text-sm">สำนักงานพัฒนาฝีมือแรงงานลพบุรี</p>
                </div>
                
                <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                    <!-- Search Box -->
                    <div class="relative w-full sm:w-64 md:w-80">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-search text-slate-400"></i>
                        </div>
                        <input
                            type="text"
                            id="searchInput"
                            placeholder="ค้นหา โครงการ, กิจกรรม, รุ่น..."
                            class="block w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg leading-5 bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
                        />
                    </div>
                    <!-- Add Project Button -->
                    <button 
                        onclick="openModal('addProject')"
                        class="flex items-center justify-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors shadow-sm shrink-0"
                    >
                        <i class="fa-solid fa-plus"></i> เพิ่มโครงการ
                    </button>
                </div>
            </div>

            <!-- แบ่งเลย์เอาต์หน้าจอเป็น 2 คอลัมน์ (ซ้ายเนื้อหา 3 ส่วน, ขวากราฟ 1 ส่วน) -->
            <div class="grid grid-cols-1 xl:grid-cols-4 gap-6 items-start">
                
                <!-- ฝั่งซ้าย: เนื้อหาหลัก -->
                <div class="xl:col-span-3 space-y-6">
                    <!-- KPI Summary Cards -->
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="kpiContainer">
                        <!-- KPI cards will be rendered here -->
                    </div>

                    <!-- Main Content: Hierarchical List -->
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="p-4 bg-slate-100 border-b border-slate-200 font-semibold text-slate-700 flex justify-between items-center">
                            <span>รายการโครงการ (Projects)</span>
                            <span id="projectCountBadge" class="text-sm font-normal bg-blue-100 text-blue-700 px-3 py-1 rounded-full">
                                กำลังโหลดข้อมูล...
                            </span>
                        </div>

                        <div class="divide-y divide-slate-100" id="projectListContainer">
                            <div class="p-12 text-center text-slate-500">
                                <i class="fa-solid fa-spinner fa-spin text-3xl text-blue-500 mb-4"></i>
                                <p>กำลังเชื่อมต่อฐานข้อมูล...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ฝั่งขวา: Sidebar สรุปกราฟ (ใช้ sticky เพื่อให้เลื่อนตามหน้าจอ) -->
                <div class="xl:col-span-1 space-y-6 sticky top-6">
                    <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                        <h3 class="font-bold text-slate-800 mb-6 text-center border-b border-slate-100 pb-3">ภาพรวมสถานะการเปิดรุ่น</h3>
                        
                        <!-- Chart Container -->
                        <div class="relative w-48 h-48 mx-auto mb-6">
                            <canvas id="trainingStatusChart"></canvas>
                            <!-- ข้อความตรงกลางกราฟวงกลม -->
                            <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                                <span class="text-3xl font-bold text-slate-800" id="chartTotalText">0</span>
                                <span class="text-[10px] text-slate-500 uppercase tracking-wider">รุ่นที่ฝึก</span>
                            </div>
                        </div>

                        <!-- คำอธิบายกราฟ (Legend & Details) -->
                        <div id="chartLegend" class="space-y-3 mt-4 border-t border-slate-100 pt-4">
                            <!-- รายละเอียดจะถูกแทรกที่นี่ด้วย JS -->
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Modal Form (Hidden by default) -->
    <div id="formModal" class="hidden-safely fixed inset-0 bg-slate-900/40 z-50 flex items-center justify-center p-4 backdrop-blur-sm overflow-y-auto">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden transform transition-all my-8">
            <div class="flex justify-between items-center p-4 border-b border-slate-100 bg-slate-50">
                <h3 id="modalTitle" class="text-lg font-bold text-slate-800">หัวข้อ</h3>
                <button onclick="closeModal()" class="p-1 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-md transition-colors">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            
            <form id="dataForm" class="p-5 space-y-4">
                <input type="hidden" id="formType">
                <input type="hidden" id="targetProjectId">
                <input type="hidden" id="targetMainActivityId">
                <input type="hidden" id="targetSubActivityId">
                <input type="hidden" id="targetCourseId">

                <!-- Dynamic inputs will be inserted here by JS -->
                <div id="modalBody" class="space-y-4"></div>

                <div class="pt-4 flex justify-end gap-2 border-t border-slate-100 mt-6">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">
                        ยกเลิก
                    </button>
                    <button type="submit" id="saveBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-2">
                        บันทึกข้อมูล
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDK & Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { 
            getFirestore, collection, onSnapshot, addDoc, updateDoc, doc 
        } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWXcS3UGqNLzFsNk0PgCTIveeLIkSOYTs",
            authDomain: "edoblock-51e6c.firebaseapp.com",
            projectId: "edoblock-51e6c",
            storageBucket: "edoblock-51e6c.firebasestorage.app",
            messagingSenderId: "426632152384",
            appId: "1:426632152384:web:73d4c59491c289f206a6a5",
            measurementId: "G-60F8TZ1NHM"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const getProjectsCol = () => collection(db, 'artifacts', appId, 'public', 'data', 'projects_v2'); 
        const getProjectDoc = (pId) => doc(db, 'artifacts', appId, 'public', 'data', 'projects_v2', pId);

        let appData = [];
        let searchTerm = '';
        let expandedProjects = new Set();
        let expandedMainActivities = new Set();
        let expandedSubActivities = new Set();
        let currentUser = null;
        let isListenerInit = false;
        let chartInstance = null; 

        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } catch (e) {
                        await signInAnonymously(auth);
                    }
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth init error:", error);
            }
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) initDBListener();
        });

        initAuth();

        function initDBListener() {
            if (isListenerInit || !currentUser) return;
            isListenerInit = true;
            
            onSnapshot(getProjectsCol(), (snapshot) => {
                appData = snapshot.docs.map(doc => ({
                    id: doc.id,
                    projectName: doc.data().projectName || 'ไม่มีชื่อโครงการ',
                    mainActivities: doc.data().mainActivities || []
                }));
                
                if (expandedProjects.size === 0 && appData.length > 0) {
                    appData.forEach(p => {
                        expandedProjects.add(p.id);
                        p.mainActivities.forEach(ma => {
                            expandedMainActivities.add(ma.id);
                            (ma.subActivities || []).forEach(sa => expandedSubActivities.add(sa.id));
                        });
                    });
                }
                renderUI();
            }, (error) => {
                document.getElementById('projectListContainer').innerHTML = `<div class="p-8 text-center text-red-500">ไม่สามารถเชื่อมต่อฐานข้อมูลได้: ${error.message}</div>`;
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value.toLowerCase();
            renderUI();
        });

        function getFilteredData() {
            if (!searchTerm.trim()) return appData;
            
            return appData.map(project => {
                const projectMatch = project.projectName.toLowerCase().includes(searchTerm);
                
                const filteredMainActivities = project.mainActivities.map(mainAct => {
                    const mainMatch = mainAct.mainActivityName.toLowerCase().includes(searchTerm);
                    
                    const filteredSubActivities = (mainAct.subActivities || []).map(subAct => {
                        const subMatch = subAct.subActivityName.toLowerCase().includes(searchTerm);
                        const filteredCourses = (subAct.courses || []).filter(c => 
                            c.courseName.toLowerCase().includes(searchTerm) ||
                            c.courseCode.toLowerCase().includes(searchTerm) ||
                            c.responsiblePerson.toLowerCase().includes(searchTerm)
                        );

                        if (subMatch || filteredCourses.length > 0 || mainMatch || projectMatch) {
                            return { ...subAct, courses: filteredCourses.length > 0 ? filteredCourses : (subAct.courses || []) };
                        }
                        return null;
                    }).filter(Boolean);

                    if (mainMatch || filteredSubActivities.length > 0 || projectMatch) {
                        return { ...mainAct, subActivities: filteredSubActivities };
                    }
                    return null;
                }).filter(Boolean);

                if (projectMatch || filteredMainActivities.length > 0) {
                    return { ...project, mainActivities: filteredMainActivities };
                }
                return null;
            }).filter(Boolean);
        }

        function renderUI() {
            const filteredData = getFilteredData();
            
            let tMainAct = 0, tSubAct = 0, tCour = 0;
            let totalTrainees = 0;
            
            // ข้อมูลสำหรับกราฟ
            let statusCounts = { done: 0, active: 0, pending: 0 };

            appData.forEach(p => {
                tMainAct += p.mainActivities.length;
                p.mainActivities.forEach(ma => {
                    tSubAct += (ma.subActivities || []).length;
                    (ma.subActivities || []).forEach(sa => {
                        tCour += (sa.courses || []).length;
                        (sa.courses || []).forEach(c => {
                            // นับยอดเป้าหมายคนฝึกอบรม (รองรับข้อมูลเก่าที่ยังไม่มีฟิลด์นี้ โดยให้ค่าเริ่มต้น 20)
                            let traineesCount = c.hasOwnProperty('trainees') ? parseInt(c.trainees) || 0 : 20;
                            totalTrainees += traineesCount;
                            
                            // นับสถานะหลักสูตร/รุ่น
                            if(c.status === 'เสร็จสิ้น') statusCounts.done++;
                            else if(c.status === 'กำลังดำเนินการ') statusCounts.active++;
                            else statusCounts.pending++;
                        });
                    });
                });
            });

            document.getElementById('kpiContainer').innerHTML = `
                ${createKpiCard('โครงการทั้งหมด', appData.length, 'fa-folder-open text-blue-500')}
                ${createKpiCard('กิจกรรมหลัก', tMainAct, 'fa-briefcase text-emerald-500')}
                ${createKpiCard('รุ่นที่เปิดฝึก', tCour, 'fa-layer-group text-amber-500')}
                ${createKpiCard('เป้าหมาย (คน)', totalTrainees, 'fa-users text-purple-500')}
            `;

            // อัปเดตกราฟทางขวามือ
            updateDashboardChart(statusCounts, tCour);

            document.getElementById('projectCountBadge').innerText = `พบ ${filteredData.length} โครงการ`;
            const listContainer = document.getElementById('projectListContainer');

            if (filteredData.length === 0) {
                listContainer.innerHTML = `<div class="p-12 text-center text-slate-500">ไม่พบข้อมูล</div>`;
                return;
            }

            let htmlStr = '';
            filteredData.forEach(project => {
                const isPExp = expandedProjects.has(project.id);
                htmlStr += `
                    <div class="p-2 border-b border-slate-100 last:border-0">
                        <!-- โครงการ -->
                        <div class="flex items-center gap-2 p-3 bg-blue-50 hover:bg-blue-100 rounded-lg cursor-pointer transition-colors group" onclick="toggleProject('${project.id}')">
                            <i class="fa-solid ${isPExp ? 'fa-chevron-down' : 'fa-chevron-right'} text-blue-400 w-4"></i>
                            <i class="fa-solid fa-folder-open text-xl text-blue-700 flex-shrink-0"></i>
                            <h2 class="text-lg font-bold text-slate-800 leading-tight">${project.projectName}</h2>
                            <button onclick="event.stopPropagation(); openModal('addMainActivity', '${project.id}')" class="ml-auto flex items-center gap-1 text-xs bg-emerald-50 text-emerald-700 hover:bg-emerald-200 px-2.5 py-1.5 rounded-md border border-emerald-200 opacity-0 group-hover:opacity-100 transition-opacity shadow-sm">
                                <i class="fa-solid fa-plus"></i> เพิ่มกิจกรรมหลัก
                            </button>
                        </div>

                        ${isPExp ? `
                        <div class="ml-6 mt-2 border-l-2 border-emerald-200 pl-4 space-y-3 pb-2">
                            ${project.mainActivities.length === 0 ? `<div class="p-3 text-sm text-slate-400 border border-dashed border-slate-200 rounded-lg">ยังไม่มีกิจกรรมหลัก</div>` : ''}
                            
                            ${project.mainActivities.map(mainAct => {
                                const isMExp = expandedMainActivities.has(mainAct.id);
                                const subActs = mainAct.subActivities || [];
                                return `
                                <div class="bg-white rounded-lg border border-slate-200 shadow-sm">
                                    <!-- กิจกรรมหลัก -->
                                    <div class="flex items-center gap-2 p-3 bg-emerald-50 hover:bg-emerald-100 rounded-t-lg cursor-pointer transition-colors group" onclick="toggleMainActivity('${mainAct.id}')">
                                        <i class="fa-solid ${isMExp ? 'fa-chevron-down' : 'fa-chevron-right'} text-emerald-500 w-4"></i>
                                        <i class="fa-solid fa-briefcase text-emerald-700 flex-shrink-0"></i>
                                        <h3 class="font-semibold text-slate-800">[กิจกรรมหลัก] ${mainAct.mainActivityName}</h3>
                                        <button onclick="event.stopPropagation(); openModal('addSubActivity', '${project.id}', '${mainAct.id}')" class="ml-auto flex items-center gap-1 text-xs bg-amber-50 text-amber-700 hover:bg-amber-200 px-2.5 py-1.5 rounded-md border border-amber-200 opacity-0 group-hover:opacity-100 transition-opacity shadow-sm">
                                            <i class="fa-solid fa-plus"></i> เพิ่มกิจกรรมย่อย
                                        </button>
                                    </div>
                                    
                                    ${isMExp ? `
                                    <div class="p-3 bg-slate-50 border-t border-slate-200 space-y-3 rounded-b-lg">
                                        ${subActs.length === 0 ? `<div class="text-sm text-slate-400 italic">ยังไม่มีกิจกรรมย่อย</div>` : ''}
                                        
                                        ${subActs.map(subAct => {
                                            const isSExp = expandedSubActivities.has(subAct.id);
                                            const courses = subAct.courses || [];
                                            return `
                                            <div class="bg-white border border-slate-200 rounded-md overflow-hidden">
                                                <!-- กิจกรรมย่อย -->
                                                <div class="flex items-center gap-2 p-2 px-3 bg-amber-50 hover:bg-amber-100 cursor-pointer transition-colors group" onclick="toggleSubActivity('${subAct.id}')">
                                                    <i class="fa-solid ${isSExp ? 'fa-chevron-down' : 'fa-chevron-right'} text-amber-500 w-4 text-xs"></i>
                                                    <i class="fa-solid fa-list-check text-amber-600 flex-shrink-0"></i>
                                                    <h4 class="font-medium text-slate-700 text-sm">[กิจกรรมย่อย] ${subAct.subActivityName}</h4>
                                                    <button onclick="event.stopPropagation(); openModal('addCourse', '${project.id}', '${mainAct.id}', '${subAct.id}')" class="ml-auto flex items-center gap-1 text-[11px] bg-white text-slate-700 hover:bg-slate-100 px-2 py-1 rounded border border-slate-300 opacity-0 group-hover:opacity-100 transition-opacity">
                                                        <i class="fa-solid fa-plus"></i> เพิ่มรุ่น/หลักสูตร
                                                    </button>
                                                </div>

                                                ${isSExp ? `
                                                <div class="overflow-x-auto border-t border-slate-100">
                                                    <table class="w-full text-sm text-left">
                                                        <thead class="text-xs text-slate-500 uppercase bg-slate-50">
                                                            <tr>
                                                                <th class="px-3 py-2">รหัส</th>
                                                                <th class="px-3 py-2">ชื่อหลักสูตร (รุ่น)</th>
                                                                <th class="px-3 py-2 text-center">ชั่วโมง</th>
                                                                <th class="px-3 py-2 text-center">จำนวนคน</th>
                                                                <th class="px-3 py-2">ผู้รับผิดชอบ</th>
                                                                <th class="px-3 py-2">วันเวลาที่เปิดฝึก</th>
                                                                <th class="px-3 py-2 text-center">สถานะ</th>
                                                                <th class="px-3 py-2 text-center">จัดการ</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody class="divide-y divide-slate-100">
                                                            ${courses.length === 0 ? `<tr><td colspan="8" class="px-3 py-4 text-center text-slate-400">ยังไม่มีข้อมูล</td></tr>` : ''}
                                                            ${courses.map(course => `
                                                            <tr class="hover:bg-slate-50">
                                                                <td class="px-3 py-2 font-mono text-slate-500 text-xs">${course.courseCode}</td>
                                                                <td class="px-3 py-2 text-slate-800"><i class="fa-solid fa-book-open text-slate-300 mr-1.5 text-xs"></i>${course.courseName}</td>
                                                                <td class="px-3 py-2 text-center text-slate-600 text-xs">${course.hours || '-'}</td>
                                                                <td class="px-3 py-2 text-center text-slate-600 text-xs">${course.hasOwnProperty('trainees') ? course.trainees : 20}</td>
                                                                <td class="px-3 py-2"><span class="inline-flex items-center gap-1 bg-slate-100 text-slate-700 px-2 py-0.5 rounded text-xs"><i class="fa-solid fa-user"></i> ${course.responsiblePerson}</span></td>
                                                                <td class="px-3 py-2 text-slate-600 text-xs">${course.trainingDate}</td>
                                                                <td class="px-3 py-2 text-center">${renderStatusBadge(course.status)}</td>
                                                                <td class="px-3 py-2 text-center">
                                                                    <button onclick="openModal('editCourse', '${project.id}', '${mainAct.id}', '${subAct.id}', '${course.id}')" class="p-1 text-slate-400 hover:text-blue-600 transition-colors"><i class="fa-solid fa-pen"></i></button>
                                                                </td>
                                                            </tr>`).join('')}
                                                        </tbody>
                                                    </table>
                                                </div>` : ''}
                                            </div>`;
                                        }).join('')}
                                    </div>` : ''}
                                </div>`;
                            }).join('')}
                        </div>` : ''}
                    </div>
                `;
            });

            listContainer.innerHTML = htmlStr;
        }

        function updateDashboardChart(counts, total) {
            const getPct = (val) => total > 0 ? Math.round((val / total) * 100) : 0;
            const donePct = getPct(counts.done);
            const activePct = getPct(counts.active);
            const pendingPct = getPct(counts.pending);

            document.getElementById('chartTotalText').innerText = total;

            document.getElementById('chartLegend').innerHTML = `
                <div class="flex justify-between items-center text-sm">
                    <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-emerald-500"></span><span class="text-slate-600">เสร็จสิ้น</span></div>
                    <span class="font-bold text-slate-800">${counts.done} <span class="text-xs text-slate-400 font-normal">(${donePct}%)</span></span>
                </div>
                <div class="flex justify-between items-center text-sm">
                    <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-blue-500"></span><span class="text-slate-600">กำลังดำเนินการ</span></div>
                    <span class="font-bold text-slate-800">${counts.active} <span class="text-xs text-slate-400 font-normal">(${activePct}%)</span></span>
                </div>
                <div class="flex justify-between items-center text-sm">
                    <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-slate-200"></span><span class="text-slate-600">รอเปิดอบรม</span></div>
                    <span class="font-bold text-slate-800">${counts.pending} <span class="text-xs text-slate-400 font-normal">(${pendingPct}%)</span></span>
                </div>
            `;

            const ctx = document.getElementById('trainingStatusChart');
            if (!ctx) return;

            const chartData = [counts.done, counts.active, counts.pending];
            const hasData = total > 0;

            if (chartInstance) {
                chartInstance.data.datasets[0].data = hasData ? chartData : [1];
                chartInstance.data.datasets[0].backgroundColor = hasData ? ['#10b981', '#3b82f6', '#e2e8f0'] : ['#f1f5f9'];
                chartInstance.update();
            } else {
                chartInstance = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['เสร็จสิ้น', 'กำลังดำเนินการ', 'รอเปิดอบรม'],
                        datasets: [{
                            data: hasData ? chartData : [1],
                            backgroundColor: hasData ? ['#10b981', '#3b82f6', '#e2e8f0'] : ['#f1f5f9'],
                            borderWidth: 0,
                            hoverOffset: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        cutout: '75%',
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                enabled: hasData,
                                callbacks: {
                                    label: function(context) {
                                        return ' ' + context.label + ': ' + context.raw + ' รุ่น';
                                    }
                                }
                            }
                        }
                    }
                });
            }
        }

        function createKpiCard(title, value, iconClass) {
            return `
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex items-center gap-3">
                <div class="p-2.5 bg-slate-50 rounded-lg"><i class="fa-solid ${iconClass} text-lg w-5 text-center"></i></div>
                <div>
                    <p class="text-xs text-slate-500 font-medium">${title}</p>
                    <p class="text-xl font-bold text-slate-800 leading-none mt-1">${value}</p>
                </div>
            </div>`;
        }

        function renderStatusBadge(status) {
            let colors = 'bg-slate-100 text-slate-600 border-slate-200';
            if (status === 'กำลังดำเนินการ') colors = 'bg-blue-50 text-blue-700 border-blue-200';
            else if (status === 'เสร็จสิ้น') colors = 'bg-emerald-50 text-emerald-700 border-emerald-200';
            return `<span class="px-2 py-0.5 text-[10px] rounded-full border font-medium whitespace-nowrap ${colors}">${status}</span>`;
        }

        window.toggleProject = (id) => { expandedProjects.has(id) ? expandedProjects.delete(id) : expandedProjects.add(id); renderUI(); };
        window.toggleMainActivity = (id) => { expandedMainActivities.has(id) ? expandedMainActivities.delete(id) : expandedMainActivities.add(id); renderUI(); };
        window.toggleSubActivity = (id) => { expandedSubActivities.has(id) ? expandedSubActivities.delete(id) : expandedSubActivities.add(id); renderUI(); };

        window.openModal = (type, pId = '', mId = '', sId = '', cId = '') => {
            document.getElementById('formModal').classList.remove('hidden-safely');
            document.getElementById('formType').value = type;
            document.getElementById('targetProjectId').value = pId;
            document.getElementById('targetMainActivityId').value = mId;
            document.getElementById('targetSubActivityId').value = sId;
            document.getElementById('targetCourseId').value = cId;
            
            const mBody = document.getElementById('modalBody');
            const title = document.getElementById('modalTitle');
            
            if (type === 'addProject') {
                title.innerText = 'เพิ่มโครงการใหม่';
                mBody.innerHTML = `<div><label class="block text-sm font-medium mb-1">ชื่อโครงการ</label><input required id="inp_pName" class="w-full p-2.5 border rounded-lg outline-none focus:ring-2 focus:ring-blue-600"></div>`;
            } else if (type === 'addMainActivity') {
                title.innerText = 'เพิ่มกิจกรรมหลัก';
                mBody.innerHTML = `<div><label class="block text-sm font-medium mb-1">ชื่อกิจกรรมหลัก</label><input required id="inp_mName" class="w-full p-2.5 border rounded-lg outline-none focus:ring-2 focus:ring-emerald-600"></div>`;
            } else if (type === 'addSubActivity') {
                title.innerText = 'เพิ่มกิจกรรมย่อย';
                mBody.innerHTML = `<div><label class="block text-sm font-medium mb-1">ชื่อกิจกรรมย่อย</label><input required id="inp_sName" class="w-full p-2.5 border rounded-lg outline-none focus:ring-2 focus:ring-amber-500"></div>`;
            } else if (type === 'addCourse' || type === 'editCourse') {
                title.innerText = type === 'addCourse' ? 'เพิ่มรุ่น/หลักสูตรใหม่' : 'แก้ไขรุ่น/หลักสูตร';
                let cData = { code: '', name: '', hours: '', trainees: 20, person: '', date: '', status: 'รอเปิดอบรม' };
                
                if (type === 'editCourse') {
                    const p = appData.find(x => x.id === pId);
                    const m = p.mainActivities.find(x => x.id === mId);
                    const s = m.subActivities.find(x => x.id === sId);
                    const c = s.courses.find(x => x.id === cId);
                    cData = { 
                        code: c.courseCode, 
                        name: c.courseName, 
                        hours: c.hours || '',
                        trainees: c.hasOwnProperty('trainees') ? c.trainees : 20,
                        person: c.responsiblePerson, 
                        date: c.trainingDate, 
                        status: c.status 
                    };
                }

                mBody.innerHTML = `
                    <div class="grid grid-cols-3 gap-3">
                        <div class="col-span-1"><label class="block text-sm font-medium mb-1">รหัส</label><input required id="inp_cCode" value="${cData.code}" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-600"></div>
                        <div class="col-span-2"><label class="block text-sm font-medium mb-1">ชื่อหลักสูตร (รุ่น)</label><input required id="inp_cName" value="${cData.name}" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-600"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="block text-sm font-medium mb-1">จำนวนชั่วโมง</label><input type="number" id="inp_cHours" value="${cData.hours}" placeholder="เช่น 18" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-600"></div>
                        <div><label class="block text-sm font-medium mb-1">จำนวนคน (ต่อรุ่น)</label><input required type="number" id="inp_cTrainees" value="${cData.trainees}" min="1" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-600"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="block text-sm font-medium mb-1">ผู้รับผิดชอบ</label><input required id="inp_cPerson" value="${cData.person}" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-600"></div>
                        <div><label class="block text-sm font-medium mb-1">วัน/เวลาที่เปิดฝึก</label><input required id="inp_cDate" value="${cData.date}" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-600"></div>
                    </div>
                    <div><label class="block text-sm font-medium mb-1">สถานะ</label>
                        <select id="inp_cStatus" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-600 bg-white">
                            <option value="รอเปิดอบรม" ${cData.status==='รอเปิดอบรม'?'selected':''}>รอเปิดอบรม</option>
                            <option value="กำลังดำเนินการ" ${cData.status==='กำลังดำเนินการ'?'selected':''}>กำลังดำเนินการ</option>
                            <option value="เสร็จสิ้น" ${cData.status==='เสร็จสิ้น'?'selected':''}>เสร็จสิ้น</option>
                        </select>
                    </div>`;
            }
        };

        window.closeModal = () => {
            document.getElementById('formModal').classList.add('hidden-safely');
            document.getElementById('dataForm').reset();
        };

        document.getElementById('dataForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return alert("กรุณารอระบบยืนยันตัวตนสักครู่...");

            const type = document.getElementById('formType').value;
            const pId = document.getElementById('targetProjectId').value;
            const mId = document.getElementById('targetMainActivityId').value;
            const sId = document.getElementById('targetSubActivityId').value;
            const cId = document.getElementById('targetCourseId').value;
            
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> กำลังบันทึก...';
            saveBtn.disabled = true;

            try {
                if (type === 'addProject') {
                    await addDoc(getProjectsCol(), {
                        projectName: document.getElementById('inp_pName').value,
                        mainActivities: []
                    });
                } 
                else if (type === 'addMainActivity') {
                    const proj = appData.find(x => x.id === pId);
                    const newMAct = { id: 'M-' + Date.now(), mainActivityName: document.getElementById('inp_mName').value, subActivities: [] };
                    await updateDoc(getProjectDoc(pId), { mainActivities: [...proj.mainActivities, newMAct] });
                    expandedMainActivities.add(newMAct.id);
                } 
                else if (type === 'addSubActivity') {
                    const proj = appData.find(x => x.id === pId);
                    const mainActs = [...proj.mainActivities];
                    const mIndex = mainActs.findIndex(x => x.id === mId);
                    
                    if (!mainActs[mIndex].subActivities) mainActs[mIndex].subActivities = [];
                    const newSAct = { id: 'S-' + Date.now(), subActivityName: document.getElementById('inp_sName').value, courses: [] };
                    mainActs[mIndex].subActivities.push(newSAct);
                    
                    await updateDoc(getProjectDoc(pId), { mainActivities: mainActs });
                    expandedSubActivities.add(newSAct.id);
                }
                else if (type === 'addCourse') {
                    const proj = appData.find(x => x.id === pId);
                    const mainActs = [...proj.mainActivities];
                    const mIndex = mainActs.findIndex(x => x.id === mId);
                    const sIndex = mainActs[mIndex].subActivities.findIndex(x => x.id === sId);
                    
                    if (!mainActs[mIndex].subActivities[sIndex].courses) mainActs[mIndex].subActivities[sIndex].courses = [];
                    mainActs[mIndex].subActivities[sIndex].courses.push({
                        id: 'C-' + Date.now(),
                        courseCode: document.getElementById('inp_cCode').value,
                        courseName: document.getElementById('inp_cName').value,
                        hours: document.getElementById('inp_cHours').value,
                        trainees: parseInt(document.getElementById('inp_cTrainees').value) || 20,
                        responsiblePerson: document.getElementById('inp_cPerson').value,
                        trainingDate: document.getElementById('inp_cDate').value,
                        status: document.getElementById('inp_cStatus').value
                    });

                    await updateDoc(getProjectDoc(pId), { mainActivities: mainActs });
                } 
                else if (type === 'editCourse') {
                    const proj = appData.find(x => x.id === pId);
                    const mainActs = [...proj.mainActivities];
                    const mIndex = mainActs.findIndex(x => x.id === mId);
                    const sIndex = mainActs[mIndex].subActivities.findIndex(x => x.id === sId);
                    const cIndex = mainActs[mIndex].subActivities[sIndex].courses.findIndex(x => x.id === cId);
                    
                    mainActs[mIndex].subActivities[sIndex].courses[cIndex] = {
                        ...mainActs[mIndex].subActivities[sIndex].courses[cIndex],
                        courseCode: document.getElementById('inp_cCode').value,
                        courseName: document.getElementById('inp_cName').value,
                        hours: document.getElementById('inp_cHours').value,
                        trainees: parseInt(document.getElementById('inp_cTrainees').value) || 20,
                        responsiblePerson: document.getElementById('inp_cPerson').value,
                        trainingDate: document.getElementById('inp_cDate').value,
                        status: document.getElementById('inp_cStatus').value
                    };

                    await updateDoc(getProjectDoc(pId), { mainActivities: mainActs });
                }
                closeModal();
            } catch (error) {
                console.error("Error saving doc:", error);
                alert("เกิดข้อผิดพลาดในการบันทึกข้อมูล: " + error.message);
            } finally {
                saveBtn.innerHTML = 'บันทึกข้อมูล';
                saveBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
